<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>게시판</title>
    <style>
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; }
        .btn-write { padding: 10px 15px; background-color: #28a745; color: white; text-decoration: none; border-radius: 5px; }
        .no-data { text-align: center; padding: 50px; color: #888; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🚀 게시판 메인</h2>
        <a th:href="@{/post/createForm}" class="btn-write">새 글 쓰기</a>
    </div>

    <hr>

    <table th:if="${!posts.isEmpty()}">
        <thead>
        <tr>
            <th>번호</th>
            <th>제목</th>
            <th>내용</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="post : ${posts}">
            <td th:text="${post.id}">1</td>
            <td>
                <a th:href="@{/post/{id}(id=${post.id})}" th:text="${post.title}">제목</a>
            </td>
            <td th:text="${post.content}">내용</td>
        </tr>
        </tbody>
    </table>

    <div th:if="${posts.isEmpty()}" class="no-data">
        <p>등록된 게시글이 없습니다. 첫 번째 글을 남겨보세요!</p>
    </div>
</div>

</body>
</html>
