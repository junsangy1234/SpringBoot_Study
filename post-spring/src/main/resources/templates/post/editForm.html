<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>글 수정</title>
    <style>
        /* 글쓰기 페이지와 동일한 스타일 (생략 가능 또는 공통 적용) */
        .container { max-width: 560px; margin: 0 auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { font-weight: bold; display: block; margin-bottom: 5px; }
        input[type="text"], textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        textarea { height: 200px; }
        .btn { padding: 10px 20px; background-color: #ffc107; color: black; border: none; border-radius: 4px; cursor: pointer; }
        .btn-cancel { background-color: #6c757d; color: white; text-decoration: none; padding: 10px 20px; border-radius: 4px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <h2>게시글 수정</h2>

    <form th:action="@{/post/{id}/edit(id=${post.id})}" method="post">

        <div class="form-group">
            <label>번호</label>
            <input type="text" th:value="${post.id}" readonly style="background-color: #eee;">
        </div>

        <div class="form-group">
            <label for="title">제목</label>
            <input type="text" id="title" name="title" th:value="${post.title}" required>
        </div>

        <div class="form-group">
            <label for="content">내용</label>
            <textarea id="content" name="content" th:text="${post.content}" required></textarea>
        </div>

        <div style="margin-top: 20px;">
            <button type="submit" class="btn">수정 완료</button>
            <a th:href="@{/post/{id}(id=${post.id})}" class="btn btn-cancel">취소</a>
        </div>

    </form>
</div>

</body>
</html>
