<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>게시글 상세</title>
    <style>
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px; margin-top: 30px; }
        .content { min-height: 200px; padding: 15px; background: #f9f9f9; border-radius: 4px; margin: 20px 0; }
        .footer { display: flex; gap: 10px; }
        .btn { padding: 8px 16px; border-radius: 4px; text-decoration: none; color: white; cursor: pointer; border: none; }
        .btn-edit { background-color: #ffc107; color: #000; }
        .btn-delete { background-color: #dc3545; }
        .btn-list { background-color: #6c757d; }
    </style>
</head>
<body>

<div class="container">
    <h2 th:text="${post.title}">제목입니다</h2>
    <p style="color: #888;">ID: <span th:text="${post.id}">1</span></p>

    <div class="content" th:text="${post.content}">
        내용이 여기에 들어갑니다.
    </div>

    <div class="footer">
        <a th:href="@{/post/{id}/edit(id=${post.id})}" class="btn btn-edit">수정</a>

        <a th:href="@{/post/{id}/delete(id=${post.id})}" class="btn btn-delete"
           onclick="return confirm('정말 삭제하시겠습니까?')">삭제</a>

        <a th:href="@{/post}" class="btn btn-list">목록으로</a>
    </div>
</div>

</body>
</html>
