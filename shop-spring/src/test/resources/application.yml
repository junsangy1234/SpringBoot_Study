spring:
  datasource:
    url: jdbc:h2:mem:testdb # 여기가 핵심! 'mem'은 메모리에서만 도는 가상 DB라는 뜻입니다.
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create # 테스트 시작할 때마다 엔티티를 보고 테이블을 새로 싹 만들어줍니다.
    properties:
      hibernate:
        show_sql: true
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug