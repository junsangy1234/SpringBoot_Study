<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>
<div class="container">
    <div th:replace="~{fragments/bodyHeader :: bodyHeader}"></div>

    <form th:action="@{/items/new}" th:object="${form}" method="post">
        <div class="form-group">
            <label>상품 종류</label>
            <select th:field="*{dtype}" id="dtype" class="form-control" onchange="toggleFields()">
                <option value="">종류 선택</option>
                <option value="BOOK">도서</option>
                <option value="ALBUM">앨범</option>
                <option value="MOVIE">영화</option>
            </select>
        </div>

        <div class="form-group">
            <label th:for="name">상품명</label>
            <input type="text" th:field="*{name}" class="form-control" placeholder="이름을 입력하세요">
        </div>
        <div class="form-group">
            <label th:for="price">가격</label>
            <input type="number" th:field="*{price}" class="form-control" placeholder="가격을 입력하세요">
        </div>
        <div class="form-group">
            <label th:for="stockQuantity">수량</label>
            <input type="number" th:field="*{stockQuantity}" class="form-control" placeholder="수량을 입력하세요">
        </div>

        <div id="book_fields" style="display:none;">
            <div class="form-group">
                <label th:for="author">저자</label>
                <input type="text" th:field="*{author}" class="form-control">
            </div>
            <div class="form-group">
                <label th:for="isbn">ISBN</label>
                <input type="text" th:field="*{isbn}" class="form-control">
            </div>
        </div>

        <div id="album_fields" style="display:none;">
            <div class="form-group">
                <label th:for="artist">아티스트</label>
                <input type="text" th:field="*{artist}" class="form-control">
            </div>
            <div class="form-group">
                <label th:for="etc">기타 정보</label>
                <input type="text" th:field="*{etc}" class="form-control">
            </div>
        </div>

        <div id="movie_fields" style="display:none;">
            <div class="form-group">
                <label th:for="actor">배우</label>
                <input type="text" th:field="*{actor}" class="form-control">
            </div>
            <div class="form-group">
                <label th:for="director">감독</label>
                <input type="text" th:field="*{director}" class="form-control">
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Submit</button>
    </form>
    <br/>
    <div th:replace="~{fragments/footer :: footer}"></div>
</div>

<script>
    function toggleFields() {
        const dtype = document.getElementById("dtype").value;
        document.getElementById("book_fields").style.display = (dtype === "BOOK") ? "block" : "none";
        document.getElementById("album_fields").style.display = (dtype === "ALBUM") ? "block" : "none";
        document.getElementById("movie_fields").style.display = (dtype === "MOVIE") ? "block" : "none";
    }
</script>
</body>
</html>
