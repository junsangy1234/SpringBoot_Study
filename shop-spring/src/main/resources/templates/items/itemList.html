<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body>

<div class="container">
    <div th:replace="~{fragments/bodyHeader :: bodyHeader}"></div>

    <div>
        <table class="table table-striped">
            <thead>
            <tr>
                <th>#</th>
                <th>종류</th>
                <th>상품명</th>
                <th>가격</th>
                <th>재고수량</th>
                <th>상세정보</th> <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${items}">
                <td th:text="${item.id}"></td>
                <td>
                    <span class="badge badge-info" th:if="${item.dtype == 'BOOK'}">도서</span>
                    <span class="badge badge-success" th:if="${item.dtype == 'ALBUM'}">앨범</span>
                    <span class="badge badge-warning" th:if="${item.dtype == 'MOVIE'}">영화</span>
                </td>
                <td th:text="${item.name}"></td>
                <td th:text="${item.price}"></td>
                <td th:text="${item.stockQuantity}"></td>
                <td>
                    <span th:if="${item.dtype == 'BOOK'}" th:text="|저자: ${item.author} / ISBN: ${item.isbn}|"></span>
                    <span th:if="${item.dtype == 'ALBUM'}" th:text="|아티스트: ${item.artist} / 기타: ${item.etc}|"></span>
                    <span th:if="${item.dtype == 'MOVIE'}" th:text="|감독: ${item.director} / 배우: ${item.actor}|"></span>
                </td>
                <td>
                    <a href="#" th:href="@{/items/{id}/edit (id=${item.id})}"
                       class="btn btn-primary" role="button">수정</a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{fragments/footer :: footer}"></div>
</div> </body>
</html>
